<header class="site-header">
  <div class="wrap">
    <a class="brand" href="{{ '/' | relative_url }}">Sharuko</a>
    <nav class="nav" aria-label="Primary">
      <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} aria-current="page"{% endif %}>Home</a>
      <a href="{{ '/blog/' | relative_url }}"{% if page.url contains '/blog' %} aria-current="page"{% endif %}>Blog</a>
      <a href="{{ '/about/' | relative_url }}"{% if page.url contains '/about' %} aria-current="page"{% endif %}>About</a>
      <a href="https://github.com/{{ site.github_username }}" rel="me noopener" target="_blank">GitHub</a>
      <a href="{{ site.linkedin_url }}" rel="me noopener" target="_blank">LinkedIn</a>
    </nav>
  </div>
</header>
